<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Readmd</title>
</head>
<body>
  <div class="container">
    <h2>📖 Readmd</h2>

    <!-- ── Reader Controls ── -->
    <div class="section">
      <div class="section-title">阅读控制</div>
      <div class="toggle-row">
        <span class="toggle-label">阅读模式</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggleReader" title="阅读模式开关">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <hr>

    <!-- ── Annotation Controls ── -->
    <div class="section">
      <div class="section-title">标注</div>
      <div class="toggle-row">
        <span class="toggle-label">批注模式</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggleAnnotate" title="批注模式开关">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <hr>

    <!-- ── Export ── -->
    <div class="section">
      <div class="section-title">导出</div>
      <div class="button-row export-row">
        <button id="exportHTML" class="export-html-btn">📄 导出 HTML</button>
        <button id="exportPDF" class="export-pdf-btn">📑 导出 PDF</button>
      </div>
    </div>

    <hr>

    <!-- ── Reading Settings ── -->
    <div class="section">
      <div class="section-title">阅读设置</div>

      <div class="setting-group">
        <label for="theme">主题</label>
        <select id="theme">
          <optgroup label="浅色主题">
            <option value="light">浅色</option>
            <option value="yellow">护眼黄</option>
            <option value="green">豆沙绿</option>
            <option value="purple">薰衣草紫</option>
            <option value="gray">薄雾灰</option>
            <option value="blue">海洋蓝</option>
          </optgroup>
          <optgroup label="深色主题">
            <option value="dark">深色</option>
            <option value="dark-purple">深紫</option>
            <option value="dark-gray">深灰</option>
            <option value="dark-blue">深蓝</option>
          </optgroup>
        </select>
      </div>

      <div class="setting-group">
        <label for="layout">布局</label>
        <select id="layout">
          <option value="single">单页</option>
          <option value="double">双页</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="fontSize">字号</label>
        <div class="range-row">
          <input type="range" id="fontSize" min="14" max="24" value="16">
          <span id="fontSizeValue">16px</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
